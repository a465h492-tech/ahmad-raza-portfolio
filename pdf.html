<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 40px 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 8px; font-size: 2rem; }
    .subtitle { text-align: center; color: #666; margin-bottom: 32px; }
    .tabs { display: flex; gap: 0; margin-bottom: 0; background: #e2e5ec; border-radius: 12px 12px 0 0; overflow: hidden; }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 600; border: none; background: transparent; color: #555; font-size: 1rem; transition: all 0.2s; }
    .tab.active { background: #fff; color: #1a1a2e; }
    .tab:hover:not(.active) { background: #d0d4dd; }
    .panel { background: #fff; padding: 32px; border-radius: 0 0 12px 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: none; }
    .panel.active { display: block; }
    h2 { margin-bottom: 20px; font-size: 1.3rem; }
    .drop-zone { border: 2px dashed #c0c4cc; border-radius: 10px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; background: #fafbfc; }
    .drop-zone:hover, .drop-zone.dragover { border-color: #4a6cf7; background: #f0f3ff; }
    .drop-zone p { color: #888; font-size: 0.95rem; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .drop-zone.has-files { border-color: #4a6cf7; background: #f0f3ff; }
    .file-list { list-style: none; margin-bottom: 20px; }
    .file-list li { padding: 8px 12px; background: #f5f7fa; border-radius: 6px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .file-list li .remove { color: #e74c3c; cursor: pointer; font-weight: bold; background: none; border: none; font-size: 1rem; }
    .file-list li .size { color: #888; font-size: 0.8rem; }
    .btn { padding: 12px 28px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #4a6cf7; color: #fff; }
    .btn-primary:hover { background: #3a5ce5; }
    .btn-primary:disabled { background: #a0b0e0; cursor: not-allowed; }
    .btn-success { background: #2ecc71; color: #fff; }
    .btn-success:hover { background: #27ae60; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
    .progress { margin-top: 16px; padding: 12px 16px; border-radius: 8px; display: none; }
    .progress.info { background: #e8f0fe; color: #1a5cc8; display: block; }
    .progress.success { background: #e6f9ed; color: #1a7a3a; display: block; }
    .progress.error { background: #fde8e8; color: #b91c1c; display: block; }
    .options { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .options label { font-size: 0.9rem; color: #555; display: flex; align-items: center; gap: 6px; }
    .options input[type="text"] { padding: 8px 12px; border: 1px solid #d0d4dd; border-radius: 6px; font-size: 0.9rem; flex: 1; min-width: 200px; }
    .options input[type="checkbox"] { width: 16px; height: 16px; }
    textarea { width: 100%; min-height: 200px; padding: 12px; border: 1px solid #d0d4dd; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.85rem; resize: vertical; margin-top: 12px; }
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .extracted-text { margin-top: 16px; }
    .extracted-text label { font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 6px; }
    #pdfViewer { width: 100%; min-height: 300px; border: 1px solid #d0d4dd; border-radius: 8px; margin-top: 12px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PDF Tool</h1>
    <p class="subtitle">Generate PDFs from your files &amp; extract text from existing PDFs</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('generate')">Generate PDF</button>
      <button class="tab" onclick="switchTab('extract')">Extract PDF</button>
    </div>

    <!-- Generate Panel -->
    <div id="panel-generate" class="panel active">
      <h2>Generate PDF from Files</h2>

      <div class="options">
        <label>Output filename:
          <input type="text" id="outputName" value="output.pdf" style="width:160px;">
        </label>
        <label>
          <input type="checkbox" id="includeSubdirs" checked> Include subdirectories
        </label>
      </div>

      <div id="dropZoneGenerate" class="drop-zone">
        <div class="icon">&#128196;</div>
        <p><strong>Click to select</strong> or drag &amp; drop files and folders here</p>
        <p style="margin-top:6px;font-size:0.85rem;color:#aaa;">Accepts any file type</p>
      </div>

      <ul id="fileListGenerate" class="file-list"></ul>

      <div class="flex-between">
        <div>
          <button class="btn btn-danger btn-sm" onclick="clearFiles('generate')">Clear All</button>
        </div>
        <button class="btn btn-primary" id="btnGenerate" onclick="generatePDF()">Generate PDF</button>
      </div>

      <div id="progressGenerate" class="progress"></div>
    </div>

    <!-- Extract Panel -->
    <div id="panel-extract" class="panel">
      <h2>Extract Text from PDF</h2>

      <div id="dropZoneExtract" class="drop-zone">
        <div class="icon">&#128462;</div>
        <p><strong>Click to select</strong> or drag &amp; drop a PDF file here</p>
      </div>

      <div id="extractProgress" class="progress"></div>

      <div class="extracted-text" id="extractedSection" style="display:none;">
        <div class="flex-between">
          <label>Extracted Text:</label>
          <div>
            <button class="btn btn-success btn-sm" onclick="downloadExtractedText()">Download .txt</button>
            <button class="btn btn-primary btn-sm" onclick="copyExtractedText()">Copy to Clipboard</button>
          </div>
        </div>
        <textarea id="extractedText" readonly></textarea>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let generateFiles = [];
    let extractFile = null;
    let extractedText = '';

    // --- Tab switching ---
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      if (name === 'generate') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('panel-generate').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('panel-extract').classList.add('active');
      }
    }

    // --- Helpers ---
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function showProgress(panel, msg, type = 'info') {
      const el = document.getElementById('progress' + panel);
      el.textContent = msg;
      el.className = 'progress ' + type;
    }

    // --- Generate: Drop zone & file management ---
    const dropGen = document.getElementById('dropZoneGenerate');
    const fileListGen = document.getElementById('fileListGenerate');

    dropGen.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.webkitdirectory = true;
      input.onchange = () => handleGenerateFiles(input.files);
      input.click();
    });

    dropGen.addEventListener('dragover', (e) => { e.preventDefault(); dropGen.classList.add('dragover'); });
    dropGen.addEventListener('dragleave', () => dropGen.classList.remove('dragover'));
    dropGen.addEventListener('drop', (e) => {
      e.preventDefault();
      dropGen.classList.remove('dragover');
      const items = e.dataTransfer.items;
      if (items) {
        const promises = [];
        for (let item of items) {
          const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
          if (entry) promises.push(traverseEntry(entry));
        }
        Promise.all(promises.flat()).then(files => {
          handleGenerateFiles(files.flat());
        });
      } else if (e.dataTransfer.files) {
        handleGenerateFiles(e.dataTransfer.files);
      }
    });

    function traverseEntry(entry) {
      return new Promise((resolve) => {
        if (entry.isFile) {
          entry.file(file => {
            file.customRelativePath = entry.fullPath.replace(/^\//, '');
            resolve([file]);
          });
        } else if (entry.isDirectory) {
          const reader = entry.createReader();
          reader.readEntries(entries => {
            Promise.all(entries.map(e => traverseEntry(e))).then(results => resolve(results.flat()));
          });
        } else {
          resolve([]);
        }
      });
    }

    function handleGenerateFiles(files) {
      for (let f of files) {
        const path = f.customRelativePath || f.webkitRelativePath || f.name;
        if (generateFiles.some(ex => ex.path === path)) continue;
        generateFiles.push({ file: f, path });
      }
      renderGenerateFiles();
      dropGen.classList.add('has-files');
    }

    function renderGenerateFiles() {
      if (generateFiles.length === 0) {
        fileListGen.innerHTML = '';
        dropGen.classList.remove('has-files');
        return;
      }
      const includeSubs = document.getElementById('includeSubdirs').checked;
      const filtered = includeSubs ? generateFiles : generateFiles.filter(f => !f.path.includes('/') && !f.path.includes('\\'));
      fileListGen.innerHTML = filtered.map((f, i) =>
        `<li><span>${f.path} <span class="size">(${formatSize(f.file.size)})</span></span>
         <button class="remove" onclick="removeGenerateFile('${f.path.replace(/'/g, "\\'")}')">&times;</button></li>`
      ).join('');
    }

    document.getElementById('includeSubdirs').addEventListener('change', renderGenerateFiles);

    function removeGenerateFile(path) {
      generateFiles = generateFiles.filter(f => f.path !== path);
      renderGenerateFiles();
    }

    function clearFiles(tab) {
      if (tab === 'generate') {
        generateFiles = [];
        renderGenerateFiles();
      } else {
        extractFile = null;
        document.getElementById('extractedSection').style.display = 'none';
        document.getElementById('extractProgress').className = 'progress';
      }
    }

    // --- Generate PDF ---
    async function generatePDF() {
      const btn = document.getElementById('btnGenerate');
      btn.disabled = true;
      const prog = document.getElementById('progressGenerate');
      const includeSubs = document.getElementById('includeSubdirs').checked;
      const files = includeSubs ? generateFiles : generateFiles.filter(f => !f.path.includes('/') && !f.path.includes('\\'));

      if (files.length === 0) {
        showProgress('Generate', 'No files selected.', 'error');
        btn.disabled = false;
        return;
      }

      showProgress('Generate', 'Reading files...');

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
        const pageW = doc.internal.pageSize.getWidth();
        const pageH = doc.internal.pageSize.getHeight();
        const margin = 40;
        const usableW = pageW - margin * 2;
        let y = margin;

        function addText(text, size = 10, style = 'normal') {
          doc.setFontSize(size);
          doc.setFont('Courier', style);
          const lines = doc.splitTextToSize(text, usableW);
          for (let line of lines) {
            if (y + size > pageH - margin) {
              doc.addPage();
              y = margin;
            }
            doc.text(line, margin, y);
            y += size * 0.35 + 4;
          }
        }

        for (let i = 0; i < files.length; i++) {
          const f = files[i];
          showProgress('Generate', `Processing ${f.path} (${i + 1}/${files.length})...`);

          const content = await f.file.text();

          if (y + 40 > pageH - margin) {
            doc.addPage();
            y = margin;
          }

          // File header
          doc.setFillColor(74, 108, 247);
          doc.rect(margin - 4, y - 6, usableW + 8, 24, 'F');
          doc.setTextColor(255, 255, 255);
          addText(`File: ${f.path}`, 11, 'bold');

          y += 4;
          doc.setTextColor(0, 0, 0);
          doc.setDrawColor(200, 200, 200);
          doc.line(margin, y, pageW - margin, y);
          y += 8;

          if (content.length === 0) {
            addText('(empty file)', 10, 'italic');
          } else {
            addText(content, 8);
          }

          y += 12;
        }

        const outName = document.getElementById('outputName').value.trim() || 'output.pdf';
        doc.save(outName);
        showProgress('Generate', `PDF saved as "${outName}" with ${files.length} files.`, 'success');
      } catch (err) {
        showProgress('Generate', `Error: ${err.message}`, 'error');
      }
      btn.disabled = false;
    }

    // --- Extract: Drop zone & file handling ---
    const dropExt = document.getElementById('dropZoneExtract');
    dropExt.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.pdf,application/pdf';
      input.onchange = () => handleExtractFile(input.files[0]);
      input.click();
    });
    dropExt.addEventListener('dragover', (e) => { e.preventDefault(); dropExt.classList.add('dragover'); });
    dropExt.addEventListener('dragleave', () => dropExt.classList.remove('dragover'));
    dropExt.addEventListener('drop', (e) => {
      e.preventDefault();
      dropExt.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') handleExtractFile(file);
      else showProgress('Extract', 'Please drop a PDF file.', 'error');
    });

    async function handleExtractFile(file) {
      extractFile = file;
      showProgress('Extract', `Loading "${file.name}"...`);
      document.getElementById('extractedSection').style.display = 'none';

      try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          showProgress('Extract', `Extracting page ${i}/${pdf.numPages}...`);
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const lines = content.items.map(item => item.str).join(' ');
          fullText += lines + '\n\n';
        }
        extractedText = fullText.trim();
        document.getElementById('extractedText').value = extractedText;
        document.getElementById('extractedSection').style.display = 'block';
        showProgress('Extract', `Extracted ${pdf.numPages} page(s) from "${file.name}".`, 'success');
      } catch (err) {
        showProgress('Extract', `Error: ${err.message}`, 'error');
      }
    }

    function downloadExtractedText() {
      if (!extractedText) return;
      const blob = new Blob([extractedText], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'extracted.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function copyExtractedText() {
      if (!extractedText) return;
      navigator.clipboard.writeText(extractedText).then(() => {
        showProgress('Extract', 'Copied to clipboard!', 'success');
      }).catch(() => {
        showProgress('Extract', 'Failed to copy.', 'error');
      });
    }
  </script>
</body>
</html>
