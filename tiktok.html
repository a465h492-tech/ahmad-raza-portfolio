<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo svg {
            width: 36px;
            height: 36px;
        }

        h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-row input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-row input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }

        .input-row button {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            background: #fe2c55;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .input-row button:hover {
            background: #d6244a;
        }

        .input-row button:active {
            transform: scale(0.97);
        }

        .input-row button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 13px;
            min-height: 20px;
            margin-bottom: 16px;
        }

        .status.error {
            color: #ff4d4d;
        }

        .result {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .result.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview {
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
            position: relative;
        }

        .preview video {
            width: 100%;
            display: block;
            max-height: 400px;
            object-fit: contain;
        }

        .preview img {
            width: 100%;
            display: block;
            max-height: 400px;
            object-fit: contain;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 16px;
        }

        .meta .author {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .meta .author span {
            color: #fff;
            font-weight: 600;
        }

        .meta .duration {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .download-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #fe2c55, #ff5842);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 20px;
            text-align: center;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 20px;
            }

            .input-row {
                flex-direction: column;
            }

            .input-row button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.48 2.89 2.89 0 01-2.88-2.89 2.89 2.89 0 012.88-2.89c.37 0 .72.07 1.04.19V7.96a6.33 6.33 0 00-1.04-.09 6.33 6.33 0 106.33 6.33V9.85a8.15 8.15 0 004.77 1.5v-3.4a4.83 4.83 0 01-1-.26z" fill="#fe2c55"/>
            </svg>
            <h1>TikTok Downloader</h1>
        </div>
        <p class="subtitle">Paste a TikTok video link to download</p>

        <div class="input-group">
            <label for="urlInput">Video URL</label>
            <div class="input-row">
                <input type="url" id="urlInput" placeholder="https://www.tiktok.com/@user/video/123456789" autocomplete="off">
                <button id="fetchBtn">Get Video</button>
            </div>
        </div>

        <div id="status" class="status"></div>

        <div id="result" class="result">
            <div class="preview">
                <video id="videoPreview" controls playsinline></video>
            </div>
            <div class="meta">
                <div class="author">by <span id="authorName">—</span></div>
                <div class="duration" id="duration">—</div>
            </div>
            <button id="downloadBtn" class="download-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download Video
            </button>
        </div>

        <div class="footer">
            <a href="#">TikTok Video Downloader</a>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        const videoPreview = document.getElementById('videoPreview');
        const authorName = document.getElementById('authorName');
        const durationEl = document.getElementById('duration');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentData = null;

        fetchBtn.addEventListener('click', fetchVideo);
        urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetchVideo(); });

        async function fetchVideo() {
            const url = urlInput.value.trim();
            if (!url) {
                setStatus('Please enter a TikTok video URL', true);
                return;
            }

            setStatus('Fetching video...', false);
            fetchBtn.disabled = true;
            resultEl.classList.remove('show');
            currentData = null;

            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if (data.code !== 0) {
                    setStatus(data.msg || 'Failed to fetch video. Check the URL.', true);
                    fetchBtn.disabled = false;
                    return;
                }

                const info = data.data;
                currentData = info;

                setStatus('', false);

                const videoUrl = info.play || info.wmplay || info.hdplay;
                if (videoUrl) {
                    videoPreview.src = videoUrl;
                    videoPreview.load();
                }

                authorName.textContent = info.author?.nickname || info.author?.unique_id || 'Unknown';
                const sec = info.duration;
                const mins = Math.floor(sec / 60);
                const secs = Math.floor(sec % 60);
                durationEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

                resultEl.classList.add('show');
            } catch (err) {
                setStatus('Network error. Try again later.', true);
            } finally {
                fetchBtn.disabled = false;
            }
        }

        downloadBtn.addEventListener('click', () => {
            if (!currentData) return;
            const videoUrl = currentData.play || currentData.wmplay || currentData.hdplay;
            if (!videoUrl) {
                setStatus('No video URL available', true);
                return;
            }

            const a = document.createElement('a');
            a.href = videoUrl;
            a.download = `tiktok_${currentData.author?.unique_id || 'video'}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        function setStatus(msg, isError) {
            statusEl.textContent = msg;
            statusEl.className = 'status' + (isError ? ' error' : '');
        }
    </script>
</body>
</html>
